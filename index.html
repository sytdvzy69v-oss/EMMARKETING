<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EM Marketing</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{

background:#f8f4ef;
color:#222;

}

.hero{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

flex-direction:column;

text-align:center;

padding:30px;

}

.logo{

font-size:80px;

font-weight:bold;

color:#b57b63;

letter-spacing:4px;

}

h1{

font-size:60px;

max-width:900px;

margin-top:20px;

line-height:1.1;

}

p{

margin-top:25px;

font-size:22px;

color:#555;

max-width:700px;

}

button{

margin-top:50px;

padding:18px 40px;

background:#b57b63;

border:none;

border-radius:40px;

font-size:18px;

color:white;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:scale(1.05);

}

</style>

</head>

<body>

<section class="hero">

<div class="logo">EM</div>

<h1>

Les contenus qui attirent.

Les résultats qui restent.

</h1>

<p>

Chaque grande marque possède une histoire.

Créons la vôtre.

</p>

<button>

Découvrir

</button>

</section>

</body>

</html>
